name: Lint

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 black isort

    - name: Run flake8
      run: flake8 . --max-line-length=88 --extend-ignore=E203,W503 --exclude=.git,__pycache__,my_project/venv

    - name: Run black (check only)
      run: black --check . --exclude my_project/venv

    - name: Run isort (check only)
      run: isort --check-only . --profile black --skip my_project/venv
